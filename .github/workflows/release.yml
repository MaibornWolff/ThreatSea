name: Release

on:
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      SO_API_TOKEN:
        required: true
  workflow_dispatch:

concurrency:
  group: release-${{ github.repository }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.repository_owner == 'MaibornWolff' && github.ref_type == 'branch' && ((github.event_name == 'push' && github.ref_name == 'main') || (github.event_name == 'workflow_dispatch' && github.ref_name == 'next'))
    permissions:
      id-token: write # for Sigstore-based provenance signing
      attestations: write
      contents: write
      packages: write
      issues: write
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Repository
        uses: ./.github/actions/repository-setup

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        id: release
        run: |
          pnpm exec semantic-release

      - name: Login to Docker Hub
        if: steps.release.outputs.new_release_published == 'true' && github.ref_name == 'main'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        if: steps.release.outputs.new_release_published == 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        if: steps.release.outputs.new_release_published == 'true'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        if: steps.release.outputs.new_release_published == 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Install cosign
        if: steps.release.outputs.new_release_published == 'true'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4

      - name: Extract metadata for next branch (prerelease)
        if: steps.release.outputs.new_release_published == 'true' && github.ref_name == 'next'
        id: meta-next
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: |
            ghcr.io/maibornwolff/threatsea
          tags: |
            type=semver,pattern={{version}},value=${{ steps.release.outputs.new_release_version }}
            type=ref,event=branch
          labels: |
            org.opencontainers.image.title=ThreatSea
            org.opencontainers.image.description=${{ vars.THREATSEA_DESCRIPTION }}
            org.opencontainers.image.vendor=MaibornWolff GmbH
            org.opencontainers.image.licenses=BSD 3-Clause

      - name: Build and push for next branch (prerelease)
        if: steps.release.outputs.new_release_published == 'true' && github.ref_name == 'next'
        id: build-next
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          push: true
          tags: ${{ steps.meta-next.outputs.tags }}
          labels: ${{ steps.meta-next.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign container image (next)
        if: steps.release.outputs.new_release_published == 'true' && github.ref_name == 'next'
        env:
          COSIGN_YES: "true"
        run: cosign sign -r ghcr.io/maibornwolff/threatsea@${{ steps.build-next.outputs.digest }}

      - name: Attest container image (next)
        if: steps.release.outputs.new_release_published == 'true' && github.ref_name == 'next'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-name: ghcr.io/maibornwolff/threatsea
          subject-digest: ${{ steps.build-next.outputs.digest }}
          push-to-registry: true

      - name: Extract metadata for main branch
        if: steps.release.outputs.new_release_published == 'true' && github.ref_name == 'main'
        id: meta-main
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: |
            maibornwolff/threatsea
            ghcr.io/maibornwolff/threatsea
          tags: |
            type=semver,pattern={{version}},value=${{ steps.release.outputs.new_release_version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.release.outputs.new_release_version }}
            type=semver,pattern={{major}},value=${{ steps.release.outputs.new_release_version }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=ThreatSea
            org.opencontainers.image.description=${{ vars.THREATSEA_DESCRIPTION }}
            org.opencontainers.image.vendor=MaibornWolff GmbH
            org.opencontainers.image.licenses=BSD 3-Clause

      - name: Build and push for main branch
        if: steps.release.outputs.new_release_published == 'true' && github.ref_name == 'main'
        id: build-main
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          push: true
          tags: ${{ steps.meta-main.outputs.tags }}
          labels: ${{ steps.meta-main.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign container images (main)
        if: steps.release.outputs.new_release_published == 'true' && github.ref_name == 'main'
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign -r maibornwolff/threatsea@${{ steps.build-main.outputs.digest }}
          cosign sign -r ghcr.io/maibornwolff/threatsea@${{ steps.build-main.outputs.digest }}

      - name: Attest Docker Hub image (main)
        if: steps.release.outputs.new_release_published == 'true' && github.ref_name == 'main'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-name: maibornwolff/threatsea
          subject-digest: ${{ steps.build-main.outputs.digest }}
          push-to-registry: true

      - name: Attest GHCR image (main)
        if: steps.release.outputs.new_release_published == 'true' && github.ref_name == 'main'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-name: ghcr.io/maibornwolff/threatsea
          subject-digest: ${{ steps.build-main.outputs.digest }}
          push-to-registry: true

  create-sbom:
    name: Create SBOM
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/create_sbom.yml
    with:
      version: ${{ needs.release.outputs.new_release_version }}
      tag: v${{ needs.release.outputs.new_release_version }}
    secrets:
      SO_API_TOKEN: ${{ secrets.SO_API_TOKEN }}
