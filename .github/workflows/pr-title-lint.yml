name: PR Title Lint

on:
  pull_request:
    branches-ignore:
      - main
    types:
      - opened
      - edited
      - reopened
      - synchronize

jobs:
  lint-pr-title:
    name: Lint PR Title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Lint PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          wip: false
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            perf
            chore
            build
            ci
            revert
          requireScope: false
