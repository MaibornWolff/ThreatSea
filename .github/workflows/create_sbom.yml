name: Create SBOM
run-name: create-sbom

on:
  workflow_call:
    inputs:
      version:
        description: "Release version without v prefix (e.g. 1.2.3)"
        required: true
        type: string
      tag:
        description: "Release tag (e.g. v1.2.3)"
        required: true
        type: string

jobs:
  sbom:
    runs-on: ubuntu-latest
    name: Generate SBOM with cdxgen
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"

      - name: Install cdxgen
        run: npm install -g @cyclonedx/cdxgen@12.1.3

      - name: Generate SBOM
        env:
          FETCH_LICENSE: "true"
        run: cdxgen -o threatsea-sbom-v${{ inputs.version }}.json --spec-version 1.5

      - name: Upload SBOM to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ inputs.tag }} threatsea-sbom-v${{ inputs.version }}.json

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: threatsea-sbom-v${{ inputs.version }}
          path: threatsea-sbom-v${{ inputs.version }}.json

      - name: Import SBOM to SecObserve
        uses: SecObserve/secobserve_actions_templates/actions/importer@main
        with:
          so_api_base_url: ${{ vars.SO_API_BASE_URL }}
          so_api_token: ${{ secrets.SO_API_TOKEN }}
          so_product_name: ${{ vars.SO_PRODUCT_NAME }}
          so_branch_name: ${{ github.ref_name }}
          so_parser_name: cdxgen
          so_file_name: threatsea-sbom-v${{ inputs.version }}.json
