name: Scan-Source

on:
  push:
    branches:
      - main
      - next

permissions:
  contents: read

jobs:
  validate:
    name: Run Scanners
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          lfs: true
      - name: Run trivy_filesystem
        uses: SecObserve/secobserve_actions_templates/actions/SCA/trivy_filesystem@8da529a0ac7ddc4a6da5812b2617b4d173660619 # v2026_03
        with:
          target: "pnpm-lock.yaml"
          report_name: "trvivy_pnpm.json"
          further_parameters: "--db-repository public.ecr.aws/aquasecurity/trivy-db:2"
          so_api_base_url: ${{ vars.SO_API_BASE_URL }}
          so_api_token: ${{ secrets.SO_API_TOKEN }}
          so_product_name: ${{ vars.SO_PRODUCT_NAME }}
          so_branch_name: ${{ github.ref_name }}
      - name: Run gitleaks
        uses: SecObserve/secobserve_actions_templates/actions/secrets/gitleaks@8da529a0ac7ddc4a6da5812b2617b4d173660619 # v2026_03
        with:
          target: "."
          report_name: "gitleaks.sarif"
          so_api_base_url: ${{ vars.SO_API_BASE_URL }}
          so_api_token: ${{ secrets.SO_API_TOKEN }}
          so_product_name: ${{ vars.SO_PRODUCT_NAME }}
          so_branch_name: ${{ github.ref_name }}
      - name: Run checkov
        uses: SecObserve/secobserve_actions_templates/actions/SAST/checkov@8da529a0ac7ddc4a6da5812b2617b4d173660619 # v2026_03
        with:
          target: "."
          report_name: "checkov.sarif"
          so_api_base_url: ${{ vars.SO_API_BASE_URL }}
          so_api_token: ${{ secrets.SO_API_TOKEN }}
          so_product_name: ${{ vars.SO_PRODUCT_NAME }}
          so_branch_name: ${{ github.ref_name }}
      - name: Run semgrep
        uses: SecObserve/secobserve_actions_templates/actions/SAST/semgrep@8da529a0ac7ddc4a6da5812b2617b4d173660619 # v2026_03
        with:
          target: "."
          report_name: "semgrep_javascript.json"
          configuration: "r/javascript"
          so_api_base_url: ${{ vars.SO_API_BASE_URL }}
          so_api_token: ${{ secrets.SO_API_TOKEN }}
          so_product_name: ${{ vars.SO_PRODUCT_NAME }}
          so_branch_name: ${{ github.ref_name }}
      - name: Run KICS
        uses: SecObserve/secobserve_actions_templates/actions/SAST/kics@8da529a0ac7ddc4a6da5812b2617b4d173660619 # v2026_03
        with:
          target: "."
          report_name: "all_kics.sarif"
          so_api_base_url: ${{ vars.SO_API_BASE_URL }}
          so_api_token: ${{ secrets.SO_API_TOKEN }}
          so_product_name: ${{ vars.SO_PRODUCT_NAME }}
          so_branch_name: ${{ github.ref_name }}
