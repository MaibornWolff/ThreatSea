{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "threatsea.fullname" . }}
  labels:
    {{- include "threatsea.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ required "gateway.gatewayName must be set when gateway.enabled=true" .Values.gateway.gatewayName }}
      {{- if .Values.gateway.gatewayNamespace }}
      namespace: {{ .Values.gateway.gatewayNamespace }}
      {{- end }}
  hostnames:
    - {{ .Values.gateway.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "threatsea.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
