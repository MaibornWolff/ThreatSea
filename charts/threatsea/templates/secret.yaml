{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "threatsea.fullname" . }}
  labels:
    {{- include "threatsea.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secret.keys.jwtSecret }}: {{ required "secret.values.jwtSecret must not be empty" .Values.secret.values.jwtSecret | quote }}
  {{ .Values.secret.keys.sessionSecret }}: {{ required "secret.values.sessionSecret must not be empty" .Values.secret.values.sessionSecret | quote }}
  {{- if not .Values.postgresql.enabled }}
  {{ .Values.secret.keys.databasePassword }}: {{ required "secret.values.databasePassword must not be empty when secret.create=true" .Values.secret.values.databasePassword | quote }}
  {{- end }}
  {{- if eq .Values.config.authMethod "oidc" }}
  {{ .Values.secret.keys.oidcClientSecret }}: {{ required "secret.values.oidcClientSecret is required when authMethod=oidc" .Values.secret.values.oidcClientSecret | quote }}
  {{- end }}
{{- end }}
